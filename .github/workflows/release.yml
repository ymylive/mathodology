name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without leading v)"
        required: true
        default: "0.1.0"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------
  # 1. Build the web bundle once (static, platform-independent).
  # ---------------------------------------------------------------------
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web build
      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 3

  # ---------------------------------------------------------------------
  # 2. Build the gateway binary per target triple.
  # ---------------------------------------------------------------------
  build-gateway:
    name: gateway / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-x86_64
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-aarch64
            ext: ""
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            platform: macos-x86_64
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-14
            platform: macos-aarch64
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            platform: windows-x86_64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # aarch64 Linux needs a cross-linker.
      - name: Install cross-compilation tooling (aarch64-linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build gateway (release)
        run: cargo build --release -p gateway --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/gateway${{ matrix.ext }} \
             artifacts/gateway-${{ matrix.platform }}${{ matrix.ext }}

      - name: Upload gateway binary
        uses: actions/upload-artifact@v4
        with:
          name: gateway-${{ matrix.platform }}
          path: artifacts/
          retention-days: 3

  # ---------------------------------------------------------------------
  # 3. Assemble per-platform bundles + publish GitHub release.
  # ---------------------------------------------------------------------
  release:
    needs: [build-web, build-gateway]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "tag=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble platform bundles
        shell: bash
        run: |
          set -euo pipefail
          V="${{ steps.ver.outputs.version }}"
          mkdir -p dist

          # Common files shipped in every bundle.
          stage_common() {
            local root="$1"
            mkdir -p "$root"/{apps,crates,packages,config,scripts}
            # Full Python worker source + shared contracts.
            cp -R apps/agent-worker "$root/apps/"
            cp -R packages/py-contracts "$root/packages/"
            cp -R packages/contracts "$root/packages/"
            # Web static bundle.
            mkdir -p "$root/apps/web"
            cp -R artifacts/web-dist "$root/apps/web/dist"
            # Gateway migrations (sqlx needs them at runtime).
            cp -R crates/gateway/migrations "$root/crates/gateway/migrations"
            # Runtime config + scripts + docs.
            cp config/providers.toml "$root/config/"
            cp .env.example "$root/"
            cp scripts/release-run.sh "$root/run.sh"
            cp scripts/release-run.ps1 "$root/run.ps1"
            cp README.md LICENSE 2>/dev/null "$root/" || true
            cp docker-compose.yml "$root/" 2>/dev/null || true
            # Version stamp.
            echo "$V" > "$root/VERSION"
          }

          for plat in linux-x86_64 linux-aarch64 macos-x86_64 macos-aarch64 windows-x86_64; do
            root="dist/mathodology-$V-$plat"
            stage_common "$root"
            # Drop in the right gateway binary.
            if [[ "$plat" == windows-* ]]; then
              cp "artifacts/gateway-$plat/gateway-$plat.exe" "$root/gateway.exe"
            else
              cp "artifacts/gateway-$plat/gateway-$plat" "$root/gateway"
              chmod +x "$root/gateway"
            fi
            # Pack.
            if [[ "$plat" == windows-* ]]; then
              (cd dist && zip -qr "mathodology-$V-$plat.zip" "$(basename $root)")
            else
              tar -C dist -czf "dist/mathodology-$V-$plat.tar.gz" "$(basename $root)"
            fi
          done

          # Keep only archives in dist/, discard staging dirs.
          find dist -maxdepth 1 -type d -name 'mathodology-*' -exec rm -rf {} +

          # Checksums.
          (cd dist && sha256sum * > SHA256SUMS.txt)
          ls -la dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Mathodology ${{ steps.ver.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
          body: |
            ## Mathodology ${{ steps.ver.outputs.tag }}

            Multi-platform builds of the Mathodology math-modeling agent stack.

            Each archive contains:
            - `gateway` / `gateway.exe` — prebuilt Rust gateway binary
            - `apps/agent-worker/` — Python worker (requires [uv](https://github.com/astral-sh/uv) + Python 3.11+)
            - `apps/web/dist/` — prebuilt Vue static bundle
            - `packages/contracts/` — OpenAPI + event schemas
            - `crates/gateway/migrations/` — sqlx migrations
            - `config/providers.toml` — LLM provider registry
            - `.env.example` — env template
            - `run.sh` / `run.ps1` — one-shot bootstrap

            ### Prerequisites on the host

            - Redis 7+
            - PostgreSQL 16+ with a database `mm` owned by user `mm` (password `mm` — change in production)
            - Python 3.11+ (worker) & [uv](https://github.com/astral-sh/uv)
            - A static web server to serve `apps/web/dist/` (any: `python -m http.server`, nginx, Caddy…)

            ### Quick start

            Unpack the archive for your platform, then:

            ```bash
            # Linux / macOS
            cp .env.example .env   # then fill in at least one *_API_KEY
            ./run.sh
            ```

            ```powershell
            # Windows PowerShell
            Copy-Item .env.example .env  # then fill in at least one *_API_KEY
            .\run.ps1
            ```

            Open `http://localhost:8080/health` to confirm the gateway is up.
            Serve `apps/web/dist/` on any static host for the UI.

            ### Verify downloads

            ```bash
            sha256sum -c SHA256SUMS.txt
            ```
