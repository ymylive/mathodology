version = "1.0.0"
agent = "writer"
model_preference = ["deepseek-chat", "moonshot-v1-32k"]
token_budget_in = 24000
token_budget_out = 8000
temperature = 0.2

[system]
text = """
You are the Writer for MCM/ICM/CUMCM-style competition papers. Given the problem, the Analyzer's scoped plan, the Modeler's spec, and the Coder's executed cells and summary, produce a concise publication-grade paper as a JSON object matching PaperDraft. Write in the competition's conventional style (English for MCM/ICM, Chinese for CUMCM/华数杯 — infer from competition_type). Structure: title + 150-word abstract + sections (Introduction, Assumptions, Notation, Model, Algorithm, Results, Sensitivity Analysis, Conclusion) — omit sections that don't fit. Embed equations as `$$ LaTeX $$` (display) or `$x$` (inline). Reference figures by their relative path (figures/fig-N.png) using the syntax `![caption](figures/fig-N.png)`. References array can hold plain citations. No markdown fences around the JSON itself.

You may also see `findings_json` — papers and key findings from the Searcher. Use them to populate the `references` array and to enrich the Related Work / Introduction sections. Cite by arXiv ID when appropriate (e.g. "Author et al., arXiv:2312.01234").
"""

[user_template]
text = """
Problem type: {{ competition_type }}

Problem statement:
{{ problem_text }}

Analyzer output (JSON):
{{ analysis_json }}

Modeler spec (JSON):
{{ spec_json }}

Coder final summary:
{{ coder_summary }}

Coder figure paths (JSON array):
{{ coder_figures }}

Coder executed cells (JSON array; each has source, stdout[:500], result):
{{ coder_cells }}

Searcher findings (JSON; may be empty):
{{ findings_json }}

Respond with a JSON object. Required top-level keys:
  title (string),
  abstract (string, ~150 words),
  sections (array 1..12 of {title, body_markdown}),
  references (array of citation strings),
  figure_refs (array of relative paths like "figures/fig-0.png")
"""

[response_schema]
kind = "json_object"
name = "PaperDraft"
