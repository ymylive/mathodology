[project]
name = "mm-contracts"
version = "0.1.0"
description = "Shared Pydantic contracts for Mathodology"
requires-python = ">=3.11,<3.13"
dependencies = [
  "pydantic>=2.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mm_contracts"]
